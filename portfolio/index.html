<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professional portfolio showcasing projects and services with modern design and animations">
    <meta name="keywords" content="portfolio, projects, services, web development">
    <meta name="author" content="Your Name">
    <meta name="theme-color" content="#000000">
    
    <!-- Open Graph -->
    <meta property="og:title" content="My Portfolio">
    <meta property="og:description" content="Professional portfolio showcasing projects and services">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourportfolio.com">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="My Portfolio">
    <meta name="twitter:description" content="Professional portfolio showcasing projects and services">
    
    <title>Portfolio - Your Name</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="#hero" class="nav-logo">Portfolio</a>
            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="#hero" class="nav-link" data-section="hero">Home</a></li>
                <li><a href="#portfolio" class="nav-link" data-section="portfolio">Portfolio</a></li>
                <li><a href="#services" class="nav-link" data-section="services">Services</a></li>
                <li><a href="#contact" class="nav-link" data-section="contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="hero" class="hero">
        <div class="hero-container">
            <h1 class="hero-title">Welcome to My Portfolio</h1>
            <p class="hero-subtitle">Crafting digital experiences with modern design and smooth animations</p>
            <button class="cta-button" data-link="#portfolio">View My Work</button>
        </div>
        <div class="hero-background"></div>
    </section>

    <!-- Portfolio Section -->
    <section id="portfolio" class="portfolio">
        <div class="container">
            <h2 class="section-title">Portfolio</h2>
            <div class="portfolio-grid" id="portfolioGrid">
                <!-- Portfolio items will be added here -->
            </div>
        </div>
    </section>

    <!-- Services Section -->
    <section id="services" class="services">
        <div class="container">
            <h2 class="section-title">Services</h2>
            <div class="services-grid" id="servicesGrid">
                <!-- Service items will be added here -->
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="contact">
        <div class="container">
            <h2 class="section-title">Get In Touch</h2>
            <form class="contact-form" id="contactForm">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <input type="text" placeholder="Subject" required>
                <textarea placeholder="Your Message" rows="5" required></textarea>
                <button type="submit" class="submit-button">Send Message</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 My Portfolio. All rights reserved.</p>
        </div>
    </footer>

    <!-- Animate.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animate.js/3.7.2/animate.min.js"></script>
    <noscript>
        <style>
            .no-animate * {
                animation: none !important;
                transition: none !important;
            }
        </style>
    </noscript>
    
    <!-- Main Script -->
    <script src="js/script.js"></script>
</body>
</html>
